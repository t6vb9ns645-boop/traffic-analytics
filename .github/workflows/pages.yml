name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      # Rebuild the encrypted app from src/ on every deploy, so the published
      # site always matches the current source — the committed public/index.html
      # is only a fallback and no longer needs manual rebuilding. Requires the
      # SITE_PASSWORD repository secret; build.js fails the run if it's missing.
      - name: Build encrypted app
        run: node build.js
        env:
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: './public'
      - id: deployment
        uses: actions/deploy-pages@v4
