<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verkehrsanalyse — geschützter Zugriff</title>
<style>
  :root{
    --bg:#0a0d10; --panel:#12171c; --line:#232c33; --text:#dbe4e9; --dim:#7a8a94;
    --accent:#28e0c5; --danger:#ff5d5d;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; background:var(--bg); color:var(--text); font-family:var(--sans);
    display:flex; align-items:center; justify-content:center;
  }
  .card{
    background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:32px;
    width:min(340px, 90vw); text-align:center;
  }
  .card h1{ font-size:14px; letter-spacing:.1em; text-transform:uppercase; margin:0 0 6px; }
  .card p{ font-size:12px; color:var(--dim); margin:0 0 20px; }
  input[type=password]{
    width:100%; background:#181f26; border:1px solid var(--line); color:var(--text);
    padding:10px 12px; border-radius:8px; font-size:14px; margin-bottom:12px;
  }
  button{
    width:100%; background:var(--accent); color:#04211d; border:none; font-weight:600;
    padding:10px 12px; border-radius:8px; font-size:13px; cursor:pointer;
  }
  button:disabled{ opacity:.6; cursor:progress; }
  .err{ color:var(--danger); font-size:12px; min-height:16px; margin-top:10px; }
</style>
</head>
<body>
<div class="card">
  <h1>Zugriff geschützt</h1>
  <p>Bitte Passwort eingeben, um die Verkehrsanalyse-App zu entschlüsseln.</p>
  <form id="pwForm">
    <input type="password" id="pwInput" autocomplete="current-password" placeholder="Passwort" required>
    <button type="submit" id="pwBtn">Entsperren</button>
  </form>
  <div class="err" id="pwErr"></div>
</div>

  const ITERATIONS = 250000;

  function b64ToBuf(b64){
    const bin = atob(b64);
    const buf = new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) buf[i] = bin.charCodeAt(i);
    return buf;
  }

  async function tryDecrypt(password){
    const enc = new TextEncoder();
    const salt = b64ToBuf(SALT_B64);
    const iv = b64ToBuf(IV_B64);
    const ciphertext = b64ToBuf(CIPHERTEXT_B64);
    const baseKey = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey(
      { name:'PBKDF2', salt, iterations: ITERATIONS, hash:'SHA-256' },
      baseKey,
      { name:'AES-GCM', length:256 },
      false,
      ['decrypt']
    );
    const plainBuf = await crypto.subtle.decrypt({ name:'AES-GCM', iv }, key, ciphertext);
    return new TextDecoder().decode(plainBuf);
  }

  const form = document.getElementById('pwForm');
  const input = document.getElementById('pwInput');
  const btn = document.getElementById('pwBtn');
  const err = document.getElementById('pwErr');

  form.addEventListener('submit', async (ev) => {
    ev.preventDefault();
    btn.disabled = true;
    err.textContent = '';
    try{
      const html = await tryDecrypt(input.value);
      document.open();
      document.write(html);
      document.close();
    }catch(e){
      err.textContent = 'Falsches Passwort.';
      btn.disabled = false;
    }
  });
})();
